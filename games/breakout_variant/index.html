<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout Variant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Breakout Variant</h1>
        <div class="score-board">Score: <span id="score">0</span> | Lives: <span id="lives">3</span></div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="controls" style="text-align: center; color: white; margin-top: 15px; font-family: sans-serif;">
            <p>🎮 <strong>操作方式：</strong>使用键盘 <kbd>←</kbd> 和 <kbd>→</kbd> 移动挡板。获得激光道具后按 <kbd>空格键</kbd> 射击。</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
