<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫雷 (Minesweeper)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>扫雷</h1>
        <div class="controls">
            <div id="mines-count">剩余雷数: 10</div>
            <button id="restart-btn">重新开始</button>
            <div id="timer">时间: 0</div>
        </div>
        <div style="text-align: center; color: #555; margin-bottom: 15px; font-family: sans-serif; font-size: 14px;">
            🎮 <strong>操作方式：</strong>鼠标 <kbd>左键</kbd> 翻开，<kbd>右键</kbd> 标记地雷。
            <div id="mobile-toggle-btn" style="display: none; margin-top: 10px; padding: 8px 16px; background-color: #2196F3; color: white; border-radius: 4px; cursor: pointer; user-select: none;">当前模式: 🔍 翻开 (点击切换为 🚩 标记)</div>
        </div>
        <div id="board" class="board"></div>
        <div id="modal" class="modal" style="display: none;">
            <div class="modal-content">
                <h2 id="modal-message">游戏结束</h2>
                <button id="modal-restart-btn">再玩一次</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
