<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Shooter 泡泡龙</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="600" height="800"></canvas>
        <div id="score-board">分数: <span id="score">0</span> <span id="level-display" style="margin-left: 20px; font-size: 16px; color: #7f8c8d;">第 1 关</span></div>
    </div>
    <div style="text-align: center; color: white; margin-top: 15px; font-family: sans-serif;">
        <p>🎮 <strong>操作方式：</strong>移动 <strong>鼠标/触摸滑动</strong> 瞄准，点击 <strong>左键/松开手指</strong> 发射泡泡。</p>
    </div>
    <div id="modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2>游戏结束</h2>
            <p>最终得分: <span id="final-score">0</span></p>
            <button id="modal-restart-btn">再玩一次</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
