<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <canvas id="pongCanvas" width="800" height="600"></canvas>
        <div style="text-align: center; color: white; margin-top: 15px; font-family: sans-serif;">
            <p>🎮 <strong>操作方式：</strong>使用键盘 <kbd>W</kbd> 和 <kbd>S</kbd> 或 <kbd>↑</kbd> 和 <kbd>↓</kbd> 控制左侧挡板移动。移动端支持 <strong>滑动屏幕</strong> 控制。</p>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
